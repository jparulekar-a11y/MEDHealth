services:
  postgres:
    image: postgres:16-alpine
    container_name: medhealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medhealth
      POSTGRES_PASSWORD: medhealth
      POSTGRES_DB: medhealth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medhealth -d medhealth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
